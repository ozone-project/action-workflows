name: Code Review

# Standalone PR-triggered code review workflow. Provides advisory suggestions only;
# not intended to be wired up as a required status check.
#
# Per-repo config: add .github/code-review.yml in the target repo to set
# min_severity and ignore_patterns (see code-review.yml for supported values).
#
# Secrets required at org level:
#   CODE_REVIEW_ANTHROPIC_API_KEY, CODE_REVIEW_APP_ID, CODE_REVIEW_APP_PRIVATE_KEY

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: code-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    uses: ozone-project/action-workflows/.github/workflows/code-review.yml@master
    secrets: inherit
