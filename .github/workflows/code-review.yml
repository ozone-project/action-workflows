name: Code Review for PRs

on:
  workflow_call:
    inputs:
      ignore_patterns:
        description: 'Newline-separated list of file patterns to exclude from code review (e.g., "*.generated.ts\ndist/**\n*.min.js")'
        required: false
        type: string
        default: ''
    secrets:
      CODE_REVIEW_ANTHROPIC_API_KEY:
        required: true
      CODE_REVIEW_GH_TOKEN:
        required: true

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code SDK
        run: npm install -g @anthropic-ai/claude-code

      - name: Clone synapse for review tools
        uses: actions/checkout@v4
        with:
          repository: ozone-project/synapse
          ref: main
          path: synapse-temp
          fetch-depth: 1
          token: ${{ secrets.CODE_REVIEW_GH_TOKEN }}

      - name: Setup synapse python shim
        run: |
          # post-review.py expects python3 at ~/.synapse/.venv/bin/python3
          # It only uses stdlib (json, subprocess), so system python3 works fine
          mkdir -p ~/.synapse/.venv/bin
          ln -s "$(which python3)" ~/.synapse/.venv/bin/python3

      - name: Run code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CODE_REVIEW_ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.CODE_REVIEW_GH_TOKEN }}
          BASE_BRANCH: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IGNORE_PATTERNS: ${{ inputs.ignore_patterns }}
        run: |
          set -e

          if [ -z "$BASE_BRANCH" ]; then
            BASE_BRANCH="main"
          fi

          echo "Running code review against base branch: $BASE_BRANCH"

          PROMPT="/check-pr $PR_NUMBER against $BASE_BRANCH"

          if [ -n "$IGNORE_PATTERNS" ]; then
            PROMPT="$PROMPT -- Ignore these file patterns: $IGNORE_PATTERNS."
          fi

          # In CI -p mode, AskUserQuestion is unavailable.
          # Instruct Claude to post the review directly without approval gate.
          PROMPT="$PROMPT -- This is an automated CI review. Post the review directly without asking for approval. Do not use AskUserQuestion. Prefix each inline comment body with its severity: [blocker], [major], or [minor]."

          # Request a debug report so we can diagnose CI review issues from artifacts.
          PROMPT="$PROMPT -- After the review is complete (whether it succeeds, fails, or finds no issues), write a debug report to 'code-review-report.md' containing: PR number and branches reviewed, number of files in the diff, number of issues found (blockers, majors, minors), verdict (APPROVE/COMMENT/REQUEST_CHANGES), whether the review was posted successfully (and the URL if so), any errors encountered during the process, the full list of issues/findings discovered (for each: type, file, line, description), the complete contents of the review payload JSON passed to post-review.py (especially the comments array), the full stdout and stderr output from post-review.py, and how many inline comments were in the payload vs how many GitHub confirmed as posted."

          echo "$PROMPT" | claude -p --dangerously-skip-permissions --plugin-dir ./synapse-temp/plugins/core

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-review-report
          retention-days: 7
          if-no-files-found: warn
          path: code-review-report.md
