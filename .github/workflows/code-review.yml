name: Code Review for PRs

on:
  workflow_call:
    inputs:
      ignore_patterns:
        description: 'Newline-separated list of file patterns to exclude from code review (e.g., "*.generated.ts\ndist/**\n*.min.js")'
        required: false
        type: string
        default: ''
      min_severity:
        description: 'Minimum severity to include in review output: "minor" (all findings), "major" (blockers + majors), "blocker" (blockers only)'
        required: false
        type: string
        default: 'minor'
    secrets:
      CODE_REVIEW_ANTHROPIC_API_KEY:
        required: true
      CODE_REVIEW_APP_ID:
        required: true
      CODE_REVIEW_APP_PRIVATE_KEY:
        required: true
      VMETRICS_PUSH_URL:
        required: false
      VMETRICS_PUSH_TOKEN:
        required: false

concurrency:
  group: code-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-review:
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CODE_REVIEW_APP_ID }}
          private-key: ${{ secrets.CODE_REVIEW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read repo code-review config
        id: review-config
        run: |
          if [ ! -f ".github/code-review.yml" ]; then
            echo "No .github/code-review.yml found, using workflow inputs"
            echo "min_severity=" >> "$GITHUB_OUTPUT"
            echo "ignore_patterns=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found .github/code-review.yml"

          MIN_SEVERITY=$(python3 -c "
import yaml
with open('.github/code-review.yml') as f:
    c = yaml.safe_load(f) or {}
v = str(c.get('min_severity', '')).strip()
if v in ('minor', 'major', 'blocker'): print(v)
" 2>&1) || { echo "Warning: failed to parse min_severity from .github/code-review.yml: $MIN_SEVERITY"; MIN_SEVERITY=""; }

          IGNORE_PATTERNS=$(python3 -c "
import yaml
with open('.github/code-review.yml') as f:
    c = yaml.safe_load(f) or {}
patterns = c.get('ignore_patterns', [])
if isinstance(patterns, list):
    print('\n'.join(str(p) for p in patterns))
elif isinstance(patterns, str):
    print(patterns.strip())
" 2>&1) || { echo "Warning: failed to parse ignore_patterns from .github/code-review.yml: $IGNORE_PATTERNS"; IGNORE_PATTERNS=""; }

          echo "min_severity=$MIN_SEVERITY" >> "$GITHUB_OUTPUT"
          DELIM=$(openssl rand -hex 8)
          {
            echo "ignore_patterns<<$DELIM"
            echo "$IGNORE_PATTERNS"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code SDK
        run: npm install -g @anthropic-ai/claude-code

      - name: Clone synapse for review tools
        uses: actions/checkout@v4
        with:
          repository: ozone-project/synapse
          ref: main
          path: synapse-temp
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup synapse python shim
        run: |
          # post-review.py expects python3 at ~/.synapse/.venv/bin/python3
          # It only uses stdlib (json, subprocess), so system python3 works fine
          mkdir -p ~/.synapse/.venv/bin
          ln -s "$(which python3)" ~/.synapse/.venv/bin/python3

      - name: Run code review
        id: review
        timeout-minutes: 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CODE_REVIEW_ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BASE_BRANCH: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IGNORE_PATTERNS: ${{ steps.review-config.outputs.ignore_patterns || inputs.ignore_patterns }}
          MIN_SEVERITY: ${{ steps.review-config.outputs.min_severity || inputs.min_severity }}
        run: |
          set -eo pipefail

          if [ -z "$BASE_BRANCH" ]; then
            BASE_BRANCH="main"
          fi

          echo "Running code review against base branch: $BASE_BRANCH"

          PROMPT="/check-pr $PR_NUMBER against $BASE_BRANCH --severity"

          if [ -n "$MIN_SEVERITY" ] && [ "$MIN_SEVERITY" != "minor" ]; then
            PROMPT="$PROMPT --min-severity $MIN_SEVERITY"
          fi

          if [ -n "$IGNORE_PATTERNS" ]; then
            PROMPT="$PROMPT -- Ignore these file patterns: $IGNORE_PATTERNS."
          fi

          # In CI -p mode, AskUserQuestion is unavailable.
          # Instruct Claude to post the review directly without approval gate.
          PROMPT="$PROMPT -- This is an automated CI review. Post the review directly without asking for approval. Do not use AskUserQuestion. NEVER post test, diagnostic, or probe reviews to the PR. If post-review.py fails, report the error in the debug report and stop. Do not attempt to work around posting failures by calling gh api directly."

          # Request a structured JSON debug report.
          read -r -d '' REPORT_TEMPLATE << 'TMPL' || true
          After the review is complete (whether it succeeds, fails, or finds no issues), write a JSON debug report to 'code-review-report.json' with this schema:
          {
            "overview": { "timestamp": "", "prNumber": 0, "repository": "", "baseBranch": "", "headBranch": "", "filesInDiff": 0, "minSeverity": "", "verdict": "", "evaluationMessage": "", "reviewPosted": false, "reviewUrl": "" },
            "summary": "",
            "fileManifest": [{ "file": "", "depth": "", "depthReason": "", "linesChanged": 0, "checks": { "security": "", "correctness": "", "errorHandling": "", "performance": "", "tests": "", "simplicity": "" }, "conventions": [{ "name": "", "result": "" }] }],
            "findings": { "blockers": [{ "file": "", "line": 0, "category": "", "description": "", "suggestion": "" }], "majors": [], "minors": [] },
            "qualityGate": [{ "finding": "", "file": "", "line": 0, "actionable": true, "accurate": true, "confident": true, "comment": "" }],
            "findingDispositions": [{ "file": "", "line": 0, "severity": "", "description": "", "disposition": "posted|merged-duplicate|existing-comment-dedup|quality-filtered|not-in-diff", "reason": "" }],
            "crossFileAnalysis": [],
            "postingDiagnostics": { "payloadComments": 0, "githubConfirmed": 0, "commentsSkippedNotInDiff": 0, "exitCode": 0, "stdout": "", "stderr": "" },
            "errors": []
          }
          Fill every field from the structured JSON review data. Use empty arrays for sections with no data, never omit fields. Every finding in the findings arrays MUST have exactly one corresponding entry in findingDispositions.
          TMPL
          PROMPT="$PROMPT -- $REPORT_TEMPLATE"

          set +e
          echo "$PROMPT" | claude -p --dangerously-skip-permissions --output-format json --plugin-dir ./synapse-temp/plugins/core > claude-output.json
          CLAUDE_EXIT=$?
          set -e

          # Print run summary (cost, duration, turns) without the full conversation
          if [ -f claude-output.json ]; then
            jq 'del(.result)' claude-output.json 2>/dev/null || echo "Warning: could not parse claude-output.json"
          fi

          echo "claude_exit_code=$CLAUDE_EXIT" >> "$GITHUB_OUTPUT"

          if [ $CLAUDE_EXIT -ne 0 ]; then
            echo "::error::Claude exited with code $CLAUDE_EXIT"
            exit $CLAUDE_EXIT
          fi

      - name: Push review metrics
        if: always()
        env:
          VMETRICS_PUSH_URL: ${{ secrets.VMETRICS_PUSH_URL }}
          VMETRICS_PUSH_TOKEN: ${{ secrets.VMETRICS_PUSH_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          CLAUDE_EXIT_CODE: ${{ steps.review.outputs.claude_exit_code }}
        run: |
          # Skip if VictoriaMetrics not configured
          if [ -z "$VMETRICS_PUSH_URL" ] || [ -z "$VMETRICS_PUSH_TOKEN" ]; then
            echo "VictoriaMetrics secrets not configured, skipping metrics push"
            exit 0
          fi

          METRICS=""

          # --- Cost & Performance metrics from claude-output.json ---
          if [ -f claude-output.json ]; then
            COST=$(jq -r '.total_cost_usd // empty' claude-output.json 2>/dev/null)
            if [ -n "$COST" ]; then
              METRICS="${METRICS}gh_code_reviewer_cost_usd{repository=\"${REPOSITORY}\"} ${COST}\n"
            fi

            TURNS=$(jq -r '.num_turns // empty' claude-output.json 2>/dev/null)
            if [ -n "$TURNS" ]; then
              METRICS="${METRICS}gh_code_reviewer_turns{repository=\"${REPOSITORY}\"} ${TURNS}\n"
            fi

            # Duration: claude phase (ms -> seconds)
            DURATION_MS=$(jq -r '.duration_ms // empty' claude-output.json 2>/dev/null)
            if [ -n "$DURATION_MS" ]; then
              DURATION_S=$(awk "BEGIN {printf \"%.3f\", $DURATION_MS / 1000}")
              METRICS="${METRICS}gh_code_reviewer_duration_seconds{repository=\"${REPOSITORY}\",phase=\"claude\"} ${DURATION_S}\n"
            fi

            # Duration: API phase (ms -> seconds)
            API_DURATION_MS=$(jq -r '.duration_api_ms // empty' claude-output.json 2>/dev/null)
            if [ -n "$API_DURATION_MS" ]; then
              API_DURATION_S=$(awk "BEGIN {printf \"%.3f\", $API_DURATION_MS / 1000}")
              METRICS="${METRICS}gh_code_reviewer_duration_seconds{repository=\"${REPOSITORY}\",phase=\"api\"} ${API_DURATION_S}\n"
            fi

            # Duration: total workflow (from GITHUB_RUN_STARTED_AT to now)
            if [ -n "$GITHUB_RUN_STARTED_AT" ]; then
              START_EPOCH=$(date -d "$GITHUB_RUN_STARTED_AT" +%s 2>/dev/null || true)
              NOW_EPOCH=$(date +%s)
              if [ -n "$START_EPOCH" ]; then
                TOTAL_DURATION=$((NOW_EPOCH - START_EPOCH))
                METRICS="${METRICS}gh_code_reviewer_duration_seconds{repository=\"${REPOSITORY}\",phase=\"total\"} ${TOTAL_DURATION}\n"
              fi
            fi

            # Token usage
            for TOKEN_TYPE in input output cache_read cache_creation; do
              VALUE=$(jq -r ".usage.${TOKEN_TYPE}_tokens // empty" claude-output.json 2>/dev/null)
              if [ -n "$VALUE" ]; then
                METRICS="${METRICS}gh_code_reviewer_tokens{repository=\"${REPOSITORY}\",type=\"${TOKEN_TYPE}\"} ${VALUE}\n"
              fi
            done
          fi

          # --- Review Quality metrics from code-review-report.json ---
          if [ -f code-review-report.json ]; then
            # Finding counts by severity
            for SEVERITY in blocker major minor; do
              COUNT=$(jq -r "[(.findingDispositions // [])[] | select(.severity == \"${SEVERITY}\" and .disposition == \"posted\")] | length" code-review-report.json 2>/dev/null)
              if [ -n "$COUNT" ] && [ "$COUNT" != "null" ]; then
                METRICS="${METRICS}gh_code_reviewer_findings{repository=\"${REPOSITORY}\",severity=\"${SEVERITY}\",posted=\"true\"} ${COUNT}\n"
              fi
              COUNT=$(jq -r "[(.findingDispositions // [])[] | select(.severity == \"${SEVERITY}\" and .disposition != \"posted\")] | length" code-review-report.json 2>/dev/null)
              if [ -n "$COUNT" ] && [ "$COUNT" != "null" ]; then
                METRICS="${METRICS}gh_code_reviewer_findings{repository=\"${REPOSITORY}\",severity=\"${SEVERITY}\",posted=\"false\"} ${COUNT}\n"
              fi
            done

            # Verdict (info metric, value always 1)
            VERDICT=$(jq -r '.overview.verdict // empty' code-review-report.json 2>/dev/null)
            if [ -n "$VERDICT" ]; then
              METRICS="${METRICS}gh_code_reviewer_verdict_info{repository=\"${REPOSITORY}\",verdict=\"${VERDICT}\"} 1\n"
            fi

            # PR scope
            FILES_IN_DIFF=$(jq -r '.overview.filesInDiff // empty' code-review-report.json 2>/dev/null)
            if [ -n "$FILES_IN_DIFF" ]; then
              METRICS="${METRICS}gh_code_reviewer_files_in_diff{repository=\"${REPOSITORY}\"} ${FILES_IN_DIFF}\n"
            fi

            # Lines changed grouped by depth
            while IFS=$'\t' read -r DEPTH LINES; do
              [ -z "$DEPTH" ] && continue
              METRICS="${METRICS}gh_code_reviewer_lines_changed{repository=\"${REPOSITORY}\",depth=\"${DEPTH}\"} ${LINES}\n"
            done < <(jq -r '(.fileManifest // []) | group_by(.depth) | .[] | "\(.[0].depth // "unknown")\t\([.[].linesChanged // 0] | add // 0)"' code-review-report.json 2>/dev/null)

            ERROR_COUNT=$(jq -r '(.errors | length) // 0' code-review-report.json 2>/dev/null)
            if [ -n "$ERROR_COUNT" ]; then
              METRICS="${METRICS}gh_code_reviewer_errors{repository=\"${REPOSITORY}\"} ${ERROR_COUNT}\n"
            fi
          fi

          # Exit code metric (available even if claude-output.json is missing)
          EXIT_CODE="${CLAUDE_EXIT_CODE:-1}"
          METRICS="${METRICS}gh_code_reviewer_exit_code{repository=\"${REPOSITORY}\"} ${EXIT_CODE}\n"

          # Push to VictoriaMetrics
          if [ -z "$METRICS" ]; then
            echo "No metrics collected, skipping push"
            exit 0
          fi

          echo "Pushing metrics to VictoriaMetrics..."
          printf '%b' "$METRICS" | curl --silent --show-error --max-time 10 \
            -X POST \
            -H "Authorization: Bearer ${VMETRICS_PUSH_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary @- \
            "${VMETRICS_PUSH_URL}" || echo "Warning: metrics push failed"

          echo "Metrics push complete"

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-review-report
          retention-days: 7
          if-no-files-found: warn
          path: |
            code-review-report.json
            claude-output.json
