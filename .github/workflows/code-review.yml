name: Code Review for PRs

on:
  workflow_call:
    inputs:
      ignore_patterns:
        description: 'Newline-separated list of file patterns to exclude from code review (e.g., "*.generated.ts\ndist/**\n*.min.js")'
        required: false
        type: string
        default: ''
    secrets:
      CODE_REVIEW_ANTHROPIC_API_KEY:
        required: true
      CODE_REVIEW_GH_TOKEN:
        required: true

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code SDK
        run: npm install -g @anthropic-ai/claude-code

      - name: Clone synapse for review tools
        uses: actions/checkout@v4
        with:
          repository: ozone-project/synapse
          ref: main
          path: synapse-temp
          fetch-depth: 1
          token: ${{ secrets.CODE_REVIEW_GH_TOKEN }}

      - name: Install synapse core plugin
        run: |
          set -e

          # Install the core plugin from synapse
          claude plugin install ./synapse-temp/plugins/core

          # post-review.py expects python3 at ~/.synapse/.venv/bin/python3
          # It only uses stdlib (json, subprocess), so system python3 works fine
          mkdir -p ~/.synapse/.venv/bin
          ln -s "$(which python3)" ~/.synapse/.venv/bin/python3

          # Clean up
          rm -rf synapse-temp

      - name: Run code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CODE_REVIEW_ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.CODE_REVIEW_GH_TOKEN }}
          BASE_BRANCH: ${{ github.base_ref }}
          IGNORE_PATTERNS: ${{ inputs.ignore_patterns }}
        run: |
          set -e

          if [ -z "$BASE_BRANCH" ]; then
            BASE_BRANCH="main"
          fi

          echo "Running code review against base branch: $BASE_BRANCH"

          PROMPT="/check-pr against $BASE_BRANCH"

          if [ -n "$IGNORE_PATTERNS" ]; then
            PROMPT="$PROMPT -- Ignore these file patterns: $IGNORE_PATTERNS."
          fi

          # In CI -p mode, AskUserQuestion is unavailable.
          # Instruct Claude to post the review directly without approval gate.
          PROMPT="$PROMPT -- This is an automated CI review. Post the review directly without asking for approval. Do not use AskUserQuestion."

          echo "$PROMPT" | claude -p --dangerously-skip-permissions
